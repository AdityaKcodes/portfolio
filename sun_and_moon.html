<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celestial</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --transition: 1.4s cubic-bezier(0.77, 0, 0.18, 1);
  }

  [data-theme="dark"] {
    --bg: #000000;
    --orb-core: #ffe066;
    --orb-mid: #ffaa00;
    --orb-outer: #cc5500;
    --orb-glow1: rgba(255, 180, 0, 0.55);
    --orb-glow2: rgba(200, 80, 0, 0.28);
    --orb-glow3: rgba(120, 30, 0, 0.12);
    --flare-color: rgba(255, 200, 50, 0.6);
    --flare-ray: rgba(255, 160, 0, 0.35);
    --text: rgba(255, 220, 120, 0.9);
    --text-sub: rgba(200, 130, 40, 0.6);
    --toggle-bg: rgba(255, 160, 0, 0.1);
    --toggle-border: rgba(255, 180, 0, 0.3);
    --toggle-icon: #ffcc00;
    --particle: rgba(255, 200, 60, 0.7);
  }

  [data-theme="light"] {
    --bg: #e4edfa;
    --orb-core: #f0f4f8;
    --orb-mid: #b0bec5;
    --orb-outer: #78909c;
    --orb-glow1: rgba(200, 215, 230, 0.65);
    --orb-glow2: rgba(150, 175, 195, 0.35);
    --orb-glow3: rgba(100, 130, 155, 0.15);
    --flare-color: rgba(220, 230, 240, 0.7);
    --flare-ray: rgba(180, 200, 220, 0.4);
    --text: rgba(50, 70, 90, 0.9);
    --text-sub: rgba(90, 110, 130, 0.65);
    --toggle-bg: rgba(100, 140, 170, 0.1);
    --toggle-border: rgba(100, 140, 180, 0.3);
    --toggle-icon: #607d8b;
    --particle: rgba(160, 190, 210, 0.75);
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
  }

  body {
    background: var(--bg);
    transition: background var(--transition);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Canvas for particles ── */
  #particles {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Main orb scene ── */
  .scene {
    position: relative;
    width: min(480px, 90vw);
    height: min(480px, 90vw);
    display: flex; align-items: center; justify-content: center;
    z-index: 1;
  }

  /* Glow layers */
  .glow-ring {
    position: absolute;
    border-radius: 50%;
    transition: all var(--transition);
  }
  .glow-ring.g3 {
    width: 100%; height: 100%;
    background: radial-gradient(circle, var(--orb-glow3) 0%, transparent 70%);
    animation: breathe 6s ease-in-out infinite;
  }
  .glow-ring.g2 {
    width: 72%; height: 72%;
    background: radial-gradient(circle, var(--orb-glow2) 0%, transparent 70%);
    animation: breathe 4.5s ease-in-out infinite 0.8s;
  }
  .glow-ring.g1 {
    width: 50%; height: 50%;
    background: radial-gradient(circle, var(--orb-glow1) 0%, transparent 75%);
    animation: breathe 3.5s ease-in-out infinite 0.3s;
  }

  /* Cloudy flare wisps */
  .wisps {
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50%;
    overflow: visible;
  }
  .wisp {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(ellipse, var(--flare-color) 0%, transparent 65%);
    transition: background var(--transition), opacity var(--transition);
    opacity: 0.5;
  }
  .wisp-1 { width: 38%; height: 22%; top: 12%; left: 28%; transform: rotate(-30deg); animation: wispFloat 7s ease-in-out infinite; }
  .wisp-2 { width: 30%; height: 18%; top: 68%; left: 40%; transform: rotate(20deg); animation: wispFloat 9s ease-in-out infinite 1.5s; }
  .wisp-3 { width: 24%; height: 15%; top: 40%; left: 8%; transform: rotate(45deg); animation: wispFloat 8s ease-in-out infinite 3s; }
  .wisp-4 { width: 26%; height: 16%; top: 35%; right: 6%; transform: rotate(-15deg); animation: wispFloat 10s ease-in-out infinite 2s; }
  .wisp-5 { width: 20%; height: 12%; top: 20%; right: 22%; transform: rotate(60deg); animation: wispFloat 6.5s ease-in-out infinite 4s; }

  /* Diagonal lens-flare rays */
  .rays {
    position: absolute; width: 100%; height: 100%;
    pointer-events: none;
  }
  .ray {
    position: absolute;
    top: 50%; left: 50%;
    width: 42%; height: 2px;
    transform-origin: 0% 50%;
    background: linear-gradient(to right, var(--flare-ray) 0%, transparent 100%);
    border-radius: 2px;
    transition: background var(--transition), opacity var(--transition);
    opacity: 0;
    animation: rayPulse 5s ease-in-out infinite;
  }
  .ray:nth-child(1) { transform: rotate(32deg);  animation-delay: 0s; }
  .ray:nth-child(2) { transform: rotate(148deg); animation-delay: 0.5s; }
  .ray:nth-child(3) { transform: rotate(210deg); animation-delay: 1.1s; width: 30%; }
  .ray:nth-child(4) { transform: rotate(310deg); animation-delay: 1.8s; width: 25%; }

  /* Core orb */
  .orb {
    position: relative;
    width: 38%; height: 38%;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 38%,
      var(--orb-core) 0%,
      var(--orb-mid) 48%,
      var(--orb-outer) 100%
    );
    box-shadow:
      0 0 40px 10px var(--orb-glow1),
      0 0 90px 30px var(--orb-glow2);
    transition: all var(--transition);
    animation: orbPulse 4s ease-in-out infinite;
    z-index: 2;
  }

  /* Moon surface craters (light theme only) */
  .orb::before {
    content: '';
    position: absolute;
    width: 22%; height: 22%;
    background: var(--orb-mid);
    border-radius: 50%;
    top: 28%; left: 22%;
    opacity: 0;
    transition: opacity var(--transition);
    box-shadow: 28px 18px 0 4px var(--orb-mid), -8px 36px 0 2px var(--orb-mid);
  }
  [data-theme="light"] .orb::before { opacity: 0.45; }

  /* Toggle button */
  .toggle {
    position: fixed;
    top: 28px; right: 32px;
    z-index: 100;
    background: var(--toggle-bg);
    border: 1px solid var(--toggle-border);
    border-radius: 50px;
    padding: 10px 20px;
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    backdrop-filter: blur(12px);
    transition: all 0.4s ease;
    user-select: none;
  }
  .toggle:hover { transform: scale(1.05); }
  .toggle-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--toggle-icon);
    transition: color var(--transition);
    text-transform: uppercase;
  }
  .toggle-icon {
    font-size: 18px;
    transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .toggle:hover .toggle-icon { transform: rotate(20deg) scale(1.15); }

  /* Centered text */
  .text-block {
    position: fixed;
    bottom: 10%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }
  .text-block h1 {
    font-family: 'Cinzel', serif;
    font-weight: 300;
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    letter-spacing: 0.35em;
    color: var(--text);
    transition: color var(--transition);
    margin-bottom: 8px;
  }
  .text-block p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.85rem, 1.5vw, 1.05rem);
    letter-spacing: 0.15em;
    color: var(--text-sub);
    transition: color var(--transition);
  }

  /* Animations */
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.75; }
  }
  @keyframes orbPulse {
    0%, 100% { box-shadow: 0 0 40px 10px var(--orb-glow1), 0 0 90px 30px var(--orb-glow2); }
    50% { box-shadow: 0 0 60px 18px var(--orb-glow1), 0 0 120px 50px var(--orb-glow2); }
  }
  @keyframes wispFloat {
    0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)) scale(1); opacity: 0.45; }
    33% { transform: translateY(-8px) rotate(calc(var(--r, 0deg) + 5deg)) scale(1.08); opacity: 0.6; }
    66% { transform: translateY(5px) rotate(calc(var(--r, 0deg) - 3deg)) scale(0.94); opacity: 0.35; }
  }
  @keyframes rayPulse {
    0%, 100% { opacity: 0; }
    40%, 60% { opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  .text-block { animation: fadeIn 2s ease forwards; }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="scene">
  <div class="glow-ring g3"></div>
  <div class="glow-ring g2"></div>
  <div class="glow-ring g1"></div>

  <div class="wisps">
    <div class="wisp wisp-1"></div>
    <div class="wisp wisp-2"></div>
    <div class="wisp wisp-3"></div>
    <div class="wisp wisp-4"></div>
    <div class="wisp wisp-5"></div>
  </div>

  <div class="rays">
    <div class="ray"></div>
    <div class="ray"></div>
    <div class="ray"></div>
    <div class="ray"></div>
  </div>

  <div class="orb"></div>
</div>

<button class="toggle" id="themeToggle" aria-label="Toggle theme">
  <span class="toggle-icon" id="toggleIcon">☀️</span>
  <span class="toggle-label" id="toggleLabel">Solar</span>
</button>

<div class="text-block">
  <h1 id="mainTitle">LUCID ORIGIN</h1>
  <p id="subTitle">where darkness holds the light</p>
</div>

<script>
  const root = document.documentElement;
  const btn  = document.getElementById('themeToggle');
  const icon = document.getElementById('toggleIcon');
  const label= document.getElementById('toggleLabel');
  const title= document.getElementById('mainTitle');
  const sub  = document.getElementById('subTitle');

  let dark = true;

  btn.addEventListener('click', () => {
    dark = !dark;
    root.setAttribute('data-theme', dark ? 'dark' : 'light');
    icon.textContent  = dark ? '☀️' : '🌙';
    label.textContent = dark ? 'Solar' : 'Lunar';
    title.textContent = dark ? 'LUCID ORIGIN' : 'PALE SILENCE';
    sub.textContent   = dark ? 'where darkness holds the light' : 'the moon breathes in grey';
    icon.style.transform = 'rotate(360deg) scale(1.2)';
    setTimeout(() => { icon.style.transform = ''; }, 600);
  });

  /* ── Particle system ── */
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() { this.reset(true); }
    reset(init = false) {
      const cx = canvas.width  / 2;
      const cy = canvas.height / 2;
      const maxR = Math.min(canvas.width, canvas.height) * 0.42;
      // start at random angle & radius near orb
      const angle = Math.random() * Math.PI * 2;
      const r     = maxR * (0.15 + Math.random() * 0.25);
      this.x  = cx + Math.cos(angle) * r;
      this.y  = cy + Math.sin(angle) * r;
      this.vx = (Math.random() - 0.5) * 0.4;
      this.vy = (Math.random() - 0.5) * 0.4;
      this.alpha = init ? Math.random() : 0;
      this.targetAlpha = 0.15 + Math.random() * 0.55;
      this.size  = 1 + Math.random() * 2.2;
      this.life  = 0;
      this.maxLife = 120 + Math.random() * 200;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.life++;
      const half = this.maxLife / 2;
      this.alpha = this.life < half
        ? (this.life / half) * this.targetAlpha
        : ((this.maxLife - this.life) / half) * this.targetAlpha;
      if (this.life >= this.maxLife) this.reset();
    }
    draw() {
      const style = getComputedStyle(root).getPropertyValue('--particle').trim();
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.fillStyle   = style;
      ctx.shadowColor = style;
      ctx.shadowBlur  = 6;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  const particles = Array.from({ length: 90 }, () => new Particle());

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
